# Basic Coturn config for long-term credentials
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
min-port=49152
max-port=65535
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=CHANGE_THIS_SECRET
realm=your.turn.realm
total-quota=100
bps-capacity=0
no-stdout-log
log-file=/var/log/turnserver/turn.log
